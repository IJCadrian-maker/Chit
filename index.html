<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Chit. — Your city, your vibe.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== Reset ===== */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
button { font: inherit; border: none; cursor: pointer; background: none; color: inherit; }
input, textarea, select { font: inherit; }
a { color: inherit; }

/* ===== Tokens ===== */
:root {
  --bg: #F2EDE4;
  --app-bg: #FFF8F1;
  --ink: #161514;
  --ink-soft: #5C5853;
  --muted: #9A938A;
  --line: #ECE3D6;
  --card: #FFFFFF;
  --primary: #FF5A4E;
  --primary-dark: #E8443A;
  --accent: #FFD93D;
  --sage: #7FB8A4;
  --lilac: #B6A8E0;
  --sky: #9DC3E6;
  --shadow-sm: 0 1px 2px rgba(22,21,20,0.06), 0 1px 1px rgba(22,21,20,0.04);
  --shadow-md: 0 6px 24px rgba(22,21,20,0.08), 0 2px 6px rgba(22,21,20,0.05);
  --shadow-lg: 0 24px 60px rgba(22,21,20,0.18), 0 8px 24px rgba(22,21,20,0.10);
  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 22px;
  --radius-xl: 28px;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  background:
    radial-gradient(ellipse at 20% 0%, #FBE7D8 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, #E8E5F5 0%, transparent 55%),
    var(--bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

/* ===== Stage ===== */
.stage { display: flex; align-items: center; gap: 48px; max-width: 1100px; width: 100%; }
.pitch { flex: 1; max-width: 380px; display: none; }
.pitch h2 {
  font-family: 'Fraunces', serif;
  font-weight: 600;
  font-size: 38px;
  line-height: 1.05;
  letter-spacing: -0.02em;
  margin: 0 0 14px;
}
.pitch h2 em { font-style: italic; color: var(--primary); }
.pitch p { color: var(--ink-soft); font-size: 15px; line-height: 1.55; margin: 0 0 18px; }
.pitch .badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--card); border: 1px solid var(--line);
  padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 500;
  color: var(--ink-soft); box-shadow: var(--shadow-sm);
  margin-bottom: 18px;
}
.pitch .badge .dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; }

.phone {
  width: 390px; height: 800px;
  background: #0c0b0a;
  border-radius: 50px;
  padding: 12px;
  box-shadow: var(--shadow-lg);
  position: relative;
  flex-shrink: 0;
}
.phone::before {
  content: ''; position: absolute; top: 22px; left: 50%; transform: translateX(-50%);
  width: 110px; height: 28px; background: #0c0b0a; border-radius: 16px; z-index: 5;
}
.screen {
  width: 100%; height: 100%; background: var(--app-bg); border-radius: 38px;
  overflow: hidden; position: relative;
  display: flex; flex-direction: column;
}

/* ===== Status bar ===== */
.status-bar {
  height: 44px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 28px 0;
  font-size: 14px; font-weight: 600; color: var(--ink);
}
.status-bar .right { display: flex; gap: 6px; align-items: center; }

/* ===== App container ===== */
.app { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; position: relative; }
.app::-webkit-scrollbar { width: 0; }

/* ===== Responsive ===== */
@media (min-width: 900px) {
  .pitch { display: block; }
}
@media (max-width: 480px) {
  body { padding: 0; background: var(--app-bg); }
  .stage { gap: 0; }
  .phone {
    width: 100%; height: 100vh; height: 100dvh;
    border-radius: 0; padding: 0;
    box-shadow: none; background: var(--app-bg);
  }
  .phone::before { display: none; }
  .screen { border-radius: 0; }
  .status-bar { display: none; }
}

/* ===== View ===== */
.view { padding: 0 24px 100px; animation: fadeIn .4s ease both; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ===== Welcome ===== */
.welcome {
  display: flex; flex-direction: column; justify-content: space-between;
  height: 100%; padding: 40px 32px 40px; position: relative;
}
.welcome .hero { display: flex; flex-direction: column; align-items: flex-start; gap: 20px; flex: 1; justify-content: center; }
.welcome .logo {
  font-family: 'Fraunces', serif;
  font-weight: 700;
  font-size: 86px;
  line-height: 0.9;
  letter-spacing: -0.04em;
  margin: 0;
}
.welcome .logo .dot { color: var(--primary); }
.welcome .tag {
  font-family: 'Fraunces', serif;
  font-weight: 500;
  font-size: 28px;
  line-height: 1.15;
  letter-spacing: -0.02em;
  margin: 0;
  max-width: 280px;
}
.welcome .tag em { font-style: italic; color: var(--primary); }
.welcome .sub { color: var(--ink-soft); font-size: 15px; margin: -8px 0 0; max-width: 280px; line-height: 1.5; }
.welcome .sticker {
  position: absolute; right: 20px; top: 130px;
  width: 110px; height: 110px;
  background: var(--accent);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Fraunces', serif; font-style: italic; font-weight: 600;
  font-size: 16px; color: var(--ink); text-align: center; line-height: 1.1;
  transform: rotate(12deg);
  box-shadow: var(--shadow-sm);
}
.welcome .actions { display: flex; flex-direction: column; gap: 10px; }

/* ===== Buttons ===== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 16px 22px;
  border-radius: 999px;
  font-weight: 600; font-size: 15px;
  transition: transform .15s ease, background .15s ease, box-shadow .15s ease;
  width: 100%;
}
.btn-primary { background: var(--ink); color: #FFF8F1; }
.btn-primary:hover { background: #2a2826; }
.btn-primary:active { transform: scale(0.98); }
.btn-secondary { background: transparent; color: var(--ink-soft); }
.btn-secondary:hover { color: var(--ink); }
.btn-coral { background: var(--primary); color: white; box-shadow: 0 6px 20px rgba(255,90,78,.35); }
.btn-coral:hover { background: var(--primary-dark); }
.btn-ghost { background: var(--card); color: var(--ink); border: 1px solid var(--line); }
.btn-ghost:hover { border-color: var(--ink-soft); }

/* ===== Onboarding ===== */
.ob-header {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 0 22px;
}
.ob-back {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--card); border: 1px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.ob-back:hover { border-color: var(--ink-soft); }
.ob-progress { flex: 1; display: flex; gap: 6px; }
.ob-progress .seg { flex: 1; height: 4px; border-radius: 2px; background: var(--line); transition: background .25s ease; }
.ob-progress .seg.active { background: var(--ink); }

.ob-title {
  font-family: 'Fraunces', serif;
  font-weight: 600;
  font-size: 32px;
  line-height: 1.1;
  letter-spacing: -0.02em;
  margin: 8px 0 6px;
}
.ob-title em { font-style: italic; color: var(--primary); }
.ob-sub { color: var(--ink-soft); font-size: 14px; margin: 0 0 24px; line-height: 1.5; }

.field { margin-bottom: 18px; }
.field label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 8px; }
.input {
  width: 100%; padding: 16px 18px;
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-md); font-size: 16px; color: var(--ink);
  outline: none; transition: border-color .15s, box-shadow .15s;
}
.input:focus { border-color: var(--ink); box-shadow: 0 0 0 4px rgba(22,21,20,0.06); }
.input::placeholder { color: var(--muted); }
select.input { appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%23161514' stroke-width='1.6' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>"); background-repeat: no-repeat; background-position: right 18px center; padding-right: 40px; }

/* ===== Chips ===== */
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  padding: 10px 14px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 999px;
  font-size: 14px; font-weight: 500; color: var(--ink-soft);
  transition: all .15s ease;
  display: inline-flex; align-items: center; gap: 6px;
  white-space: nowrap;
}
.chip:hover { border-color: var(--ink-soft); color: var(--ink); }
.chip.selected { background: var(--ink); color: #FFF8F1; border-color: var(--ink); }
.chip .emoji { font-size: 15px; }

/* ===== Bottom action ===== */
.bottom-action {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 16px 24px 28px;
  background: linear-gradient(180deg, rgba(255,248,241,0) 0%, var(--app-bg) 30%);
  z-index: 10;
}

/* ===== Feed ===== */
.feed-header { padding: 18px 0 14px; }
.feed-greet { font-size: 13px; color: var(--ink-soft); margin: 0 0 6px; }
.feed-title {
  font-family: 'Fraunces', serif; font-weight: 600;
  font-size: 30px; letter-spacing: -0.02em; line-height: 1.05;
  margin: 0; display: flex; align-items: baseline; flex-wrap: wrap; gap: 6px;
}
.feed-title em { font-style: italic; color: var(--primary); }
.feed-title .city-pill {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--accent); border-radius: 999px;
  font-family: 'Inter', sans-serif; font-weight: 600;
  font-size: 14px; padding: 4px 10px;
  color: var(--ink); border: 1px solid rgba(0,0,0,0.08);
}

.filter-row {
  display: flex; gap: 8px; padding: 6px 0 16px;
  overflow-x: auto; scrollbar-width: none;
  margin: 0 -24px; padding-left: 24px; padding-right: 24px;
}
.filter-row::-webkit-scrollbar { display: none; }
.filter-row .chip { flex-shrink: 0; }

/* ===== Banner ===== */
.upgrade-banner {
  background: linear-gradient(135deg, #FFE9C7 0%, #FFD0C2 100%);
  border-radius: var(--radius-lg);
  padding: 18px 18px 18px 20px;
  margin-bottom: 16px;
  position: relative; overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.upgrade-banner::before {
  content: ''; position: absolute; right: -30px; top: -30px;
  width: 130px; height: 130px; border-radius: 50%;
  background: rgba(255,90,78,0.12);
}
.upgrade-banner h3 {
  font-family: 'Fraunces', serif; font-weight: 600;
  font-size: 20px; letter-spacing: -0.01em; line-height: 1.15;
  margin: 0 0 4px; max-width: 220px;
  position: relative;
}
.upgrade-banner p {
  font-size: 13px; color: var(--ink-soft); margin: 0 0 12px; max-width: 240px; line-height: 1.45;
  position: relative;
}
.upgrade-banner .cta {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--ink); color: #FFF8F1;
  padding: 10px 16px; border-radius: 999px;
  font-size: 13px; font-weight: 600;
  position: relative;
}
.upgrade-banner .cta:hover { background: #2a2826; }

/* ===== Event cards ===== */
.event-list { display: flex; flex-direction: column; gap: 12px; }

.event-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  position: relative;
  cursor: pointer;
}
.event-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); border-color: transparent; }

.event-img {
  height: 110px;
  background: linear-gradient(135deg, var(--c1, #FFD93D) 0%, var(--c2, #FF5A4E) 100%);
  position: relative; display: flex; align-items: flex-end; padding: 14px;
}
.event-img .date-badge {
  position: absolute; top: 12px; left: 14px;
  background: rgba(255,248,241,0.92); backdrop-filter: blur(6px);
  border-radius: 12px; padding: 6px 10px;
  display: flex; flex-direction: column; align-items: center; min-width: 44px;
  font-weight: 700;
}
.event-img .date-badge .day { font-size: 18px; line-height: 1; color: var(--ink); }
.event-img .date-badge .mon { font-size: 10px; line-height: 1; color: var(--primary); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.08em; }
.event-img .cat-badge {
  background: rgba(22,21,20,0.85); color: #FFF8F1;
  border-radius: 999px; padding: 5px 10px;
  font-size: 11px; font-weight: 600;
  display: inline-flex; align-items: center; gap: 4px;
}

.event-body { padding: 14px 16px 16px; }
.event-title {
  font-family: 'Fraunces', serif; font-weight: 600;
  font-size: 18px; letter-spacing: -0.01em; line-height: 1.2;
  margin: 0 0 4px;
}
.event-meta { font-size: 12px; color: var(--ink-soft); display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.event-meta .sep { width: 3px; height: 3px; background: var(--muted); border-radius: 50%; }
.event-desc { font-size: 13px; color: var(--ink-soft); line-height: 1.5; margin: 0 0 10px; }
.event-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.event-tag {
  font-size: 11px; font-weight: 500; color: var(--ink-soft);
  background: var(--app-bg); border: 1px solid var(--line);
  padding: 3px 8px; border-radius: 999px;
}

/* ===== Picks ===== */
.picks-header { padding: 18px 0 22px; }
.picks-eyebrow {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--primary); margin-bottom: 6px;
}
.picks-title {
  font-family: 'Fraunces', serif; font-weight: 600;
  font-size: 32px; letter-spacing: -0.02em; line-height: 1.05;
  margin: 0 0 8px;
}
.picks-title em { font-style: italic; color: var(--primary); }
.picks-sub { font-size: 14px; color: var(--ink-soft); margin: 0; line-height: 1.5; }

.pick-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius-xl);
  overflow: hidden;
  margin-bottom: 16px;
  transition: transform .15s ease, box-shadow .15s ease;
}
.pick-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.pick-card .number-row { display: flex; align-items: center; gap: 10px; padding: 14px 18px 0; }
.pick-card .number {
  font-family: 'Fraunces', serif; font-weight: 700; font-style: italic;
  font-size: 28px; color: var(--primary); line-height: 1;
}
.pick-card .number-label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
.pick-card .reason {
  margin: 8px 18px 0; padding: 10px 12px;
  background: var(--app-bg); border-radius: var(--radius-sm);
  font-size: 12px; color: var(--ink-soft); line-height: 1.5;
  display: flex; gap: 8px; align-items: flex-start;
}
.pick-card .reason .ic { color: var(--primary); flex-shrink: 0; font-weight: 700; }
.pick-card .pick-img {
  margin: 14px 18px 0; height: 130px; border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--c1, #FFD93D) 0%, var(--c2, #FF5A4E) 100%);
  position: relative; display: flex; align-items: flex-end; padding: 12px;
}
.pick-card .pick-img .date-badge {
  position: absolute; top: 10px; left: 12px;
  background: rgba(255,248,241,0.92); backdrop-filter: blur(6px);
  border-radius: 12px; padding: 6px 10px;
  display: flex; flex-direction: column; align-items: center; min-width: 44px;
  font-weight: 700;
}
.pick-card .pick-img .date-badge .day { font-size: 18px; line-height: 1; color: var(--ink); }
.pick-card .pick-img .date-badge .mon { font-size: 10px; line-height: 1; color: var(--primary); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.08em; }
.pick-card .pick-img .cat-badge {
  background: rgba(22,21,20,0.85); color: #FFF8F1;
  border-radius: 999px; padding: 5px 10px;
  font-size: 11px; font-weight: 600;
}
.pick-card .pick-body { padding: 14px 18px 18px; }
.pick-card .pick-title {
  font-family: 'Fraunces', serif; font-weight: 600;
  font-size: 22px; letter-spacing: -0.01em; line-height: 1.15;
  margin: 0 0 4px;
}
.pick-card .pick-meta { font-size: 12px; color: var(--ink-soft); display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.pick-card .pick-meta .sep { width: 3px; height: 3px; background: var(--muted); border-radius: 50%; }
.pick-card .pick-desc { font-size: 13px; color: var(--ink-soft); line-height: 1.55; margin: 0 0 12px; }
.pick-card .pick-actions { display: flex; gap: 8px; }
.pick-card .pick-actions a {
  flex: 1; display: inline-flex; align-items: center; justify-content: center;
  padding: 11px 14px; border-radius: 999px;
  font-size: 13px; font-weight: 600; text-decoration: none;
  background: var(--ink); color: #FFF8F1;
  transition: background .15s;
}
.pick-card .pick-actions a:hover { background: #2a2826; }
.pick-card .pick-actions .save {
  flex: 0 0 44px; background: var(--app-bg); color: var(--ink);
  border: 1px solid var(--line); display: inline-flex; align-items: center; justify-content: center;
}
.pick-card .pick-actions .save:hover { border-color: var(--ink-soft); }

/* ===== Modal ===== */
.modal-backdrop {
  position: absolute; inset: 0; background: rgba(22,21,20,0.55);
  backdrop-filter: blur(4px);
  display: flex; align-items: flex-end;
  z-index: 100;
  animation: fadeIn .25s ease;
}
.modal {
  background: var(--app-bg);
  width: 100%;
  border-radius: 28px 28px 0 0;
  padding: 22px 24px 28px;
  box-shadow: 0 -10px 40px rgba(0,0,0,0.2);
  animation: slideUp .3s cubic-bezier(.2,.8,.2,1) both;
  max-height: 92%;
  overflow-y: auto;
}
@keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal .grabber { width: 38px; height: 4px; background: var(--line); border-radius: 2px; margin: 0 auto 14px; }
.modal h2 {
  font-family: 'Fraunces', serif; font-weight: 600;
  font-size: 28px; letter-spacing: -0.02em; line-height: 1.1;
  margin: 0 0 6px;
}
.modal h2 em { font-style: italic; color: var(--primary); }
.modal .price {
  font-family: 'Fraunces', serif; font-weight: 700;
  font-size: 44px; letter-spacing: -0.03em; line-height: 1; margin: 14px 0 4px;
}
.modal .price small { font-size: 16px; font-weight: 500; color: var(--ink-soft); margin-left: 4px; }
.modal .price-sub { font-size: 13px; color: var(--ink-soft); margin: 0 0 18px; }
.modal .features { list-style: none; padding: 0; margin: 0 0 22px; display: flex; flex-direction: column; gap: 12px; }
.modal .features li { display: flex; gap: 12px; align-items: flex-start; font-size: 14px; line-height: 1.45; }
.modal .features .check {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--primary); color: white;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 12px; font-weight: 700;
}
.modal .features strong { display: block; }
.modal .features span { color: var(--ink-soft); font-size: 13px; }
.modal .footnote { text-align: center; font-size: 11px; color: var(--muted); margin: 12px 0 0; }
.modal .footnote a { text-decoration: underline; }


/* ===== Loading ===== */
.loading {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 60px 24px; text-align: center; height: 100%;
}
.loading .pulse {
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--primary);
  animation: pulse 1.6s ease-in-out infinite;
  margin-bottom: 18px;
  display: flex; align-items: center; justify-content: center;
  color: white; font-family: 'Fraunces', serif; font-weight: 700; font-size: 32px;
}
@keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.08); opacity: 0.85; } }
.loading p {
  font-family: 'Fraunces', serif; font-weight: 500; font-style: italic;
  font-size: 18px; color: var(--ink-soft); margin: 0;
}

/* ===== Profile ===== */
.profile-card {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius-lg); padding: 18px; margin-bottom: 16px;
}
.profile-card .row { display: flex; align-items: center; gap: 12px; }
.profile-card .avatar {
  width: 52px; height: 52px; border-radius: 50%;
  background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
  display: flex; align-items: center; justify-content: center;
  color: white; font-family: 'Fraunces', serif; font-weight: 700; font-size: 22px;

}
.profile-card .meta strong { display: block; font-size: 16px; }
.profile-card .meta span { font-size: 13px; color: var(--ink-soft); }
.profile-card .plus-pill {
  margin-left: auto;

}

/* ===== Toast ===== */
.toast {

  background: var(--ink); color: #FFF8F1;

  z-index: 200;
  animation: toastIn .3s ease both;
  white-space: nowrap; max-width: calc(100% - 32px);
  text-overflow: ellipsis; overflow: hidden;
}
@keyframes toastIn { from { transform: translate(-50%, 12px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }

/* ===== Empty ===== */
.empty { text-align: center; padding: 40px 20px; color: var(--ink-soft); }
.empty .icon { font-size: 32px; margin-bottom: 8px; }
.empty p { font-size: 14px; margin: 0; }

/* ===== Section heading ===== */
.section-head { display: flex; align-items: baseline; justify-content: space-between; margin: 8px 0 12px; }
.section-head h3 { font-family: 'Fraunces', serif; font-weight: 600; font-size: 18px; letter-spacing: -0.01em; margin: 0; }
.section-head .count { font-size: 12px; color: var(--muted); }

.divider { height: 1px; background: var(--line); margin: 16px 0; }
</style>
</head>

<script>
/* ============================================================
   Chit. — Beta app
   Single-file mock. Replace EVENTS with real API later.
   ============================================================ */

const CITIES = [
  'New York, NY', 'Brooklyn, NY', 'Los Angeles, CA', 'Chicago, IL',
  'Austin, TX', 'Seattle, WA', 'San Francisco, CA', 'Miami, FL',
  'Portland, OR', 'Boston, MA', 'Denver, CO', 'Nashville, TN'
];

const INTERESTS = [
  { id: 'music',     label: 'Music',     emoji: '🎶' },
  { id: 'art',       label: 'Art',       emoji: '🎨' },
  { id: 'food',      label: 'Food',      emoji: '🍜' },
  { id: 'books',     label: 'Books',     emoji: '📚' },
  { id: 'outdoors',  label: 'Outdoors',  emoji: '🌲' },
  { id: 'fitness',   label: 'Fitness',   emoji: '🏃' },
  { id: 'tech',      label: 'Tech',      emoji: '💻' },
  { id: 'film',      label: 'Film',      emoji: '🎬' },
  { id: 'comedy',    label: 'Comedy',    emoji: '🎤' },
  { id: 'wellness',  label: 'Wellness',  emoji: '🧘' },
  { id: 'nightlife', label: 'Nightlife', emoji: '🌙' },
  { id: 'coffee',    label: 'Coffee',    emoji: '☕' },
  { id: 'crafts',    label: 'Crafts',    emoji: '🧶' },
  { id: 'theater',   label: 'Theater',   emoji: '🎭' }
];

const VIBES = [
  { id: 'chill',       label: 'Chill',       emoji: '🌿' },
  { id: 'adventurous', label: 'Adventurous', emoji: '⚡' },
  { id: 'social',      label: 'Social',      emoji: '🥂' },
  { id: 'cozy',        label: 'Cozy',        emoji: '🕯️' },
  { id: 'trendy',      label: 'Trendy',      emoji: '✨' },
  { id: 'artsy',       label: 'Artsy',       emoji: '🖌️' }
];

const PALETTES = [
  ['#FFD93D', '#FF5A4E'], ['#7FB8A4', '#FFD93D'], ['#B6A8E0', '#FF5A4E'],
  ['#9DC3E6', '#7FB8A4'], ['#FFB4A2', '#FF5A4E'], ['#FFE5B4', '#FFB347'],
  ['#C9E4CA', '#7FB8A4'], ['#E8C2CA', '#B6A8E0'], ['#A0C4FF', '#9DC3E6'],
  ['#FFD6A5', '#FF5A4E'], ['#CAFFBF', '#7FB8A4'], ['#FDFFB6', '#FFD93D']
];

const MEETUP_API_KEY = ''; // Optional: add your Meetup API key for richer results.
const CITY_COORDINATES = {
  'New York, NY': { lat: 40.7128, lon: -74.0060 },
  'Brooklyn, NY': { lat: 40.6782, lon: -73.9442 },
  'Los Angeles, CA': { lat: 34.0522, lon: -118.2437 },
  'Chicago, IL': { lat: 41.8781, lon: -87.6298 },
  'Austin, TX': { lat: 30.2672, lon: -97.7431 },
  'Seattle, WA': { lat: 47.6062, lon: -122.3321 },
  'San Francisco, CA': { lat: 37.7749, lon: -122.4194 },
  'Miami, FL': { lat: 25.7617, lon: -80.1918 },
  'Portland, OR': { lat: 45.5051, lon: -122.6750 },
  'Boston, MA': { lat: 42.3601, lon: -71.0589 },
  'Denver, CO': { lat: 39.7392, lon: -104.9903 },
  'Nashville, TN': { lat: 36.1627, lon: -86.7816 }
};

const FALLBACK_EVENTS = [
  { id:'ny-fallback', title:'Neighborhood Coffee Meet', city:'New York, NY', date:'2026-05-10', time:'11:00 AM', venue:'East Village Café', categories:['coffee','social'], vibes:['cozy','social'], desc:'A low-key meetup for new arrivals to swap recommendations and make a few friends.', url:'https://www.meetup.com' },
  { id:'la-fallback', title:'Sunset Hike + Tacos', city:'Los Angeles, CA', date:'2026-05-10', time:'6:30 PM', venue:'Griffith Park', categories:['outdoors','food'], vibes:['adventurous','social'], desc:'A casual group hike with tacos at the top. Great for new people and first-time Angelenos.', url:'https://www.meetup.com' },
  { id:'ch-fallback', title:'Live Comedy Night', city:'Chicago, IL', date:'2026-05-09', time:'8:00 PM', venue:'Wrigleyville Comedy Club', categories:['comedy','nightlife'], vibes:['social','trendy'], desc:'A small comedy room with local stand-up and a friendly crowd. Perfect for a first night out.', url:'https://www.meetup.com' },
  { id:'au-fallback', title:'Brunch & Board Games', city:'Austin, TX', date:'2026-05-11', time:'11:00 AM', venue:'East Austin Café', categories:['food','games'], vibes:['cozy','artsy'], desc:'A laid-back morning meetup for coffee, brunch, and board games. New folks always welcome.', url:'https://www.meetup.com' },
  { id:'se-fallback', title:'Coffee Tasting Walk', city:'Seattle, WA', date:'2026-05-10', time:'10:00 AM', venue:'Capitol Hill', categories:['coffee','food'], vibes:['cozy','artsy'], desc:'Visit three roasters on a guided tasting walk through Capitol Hill.', url:'https://www.meetup.com' },
  { id:'sf-fallback', title:'Mission Street Art Walk', city:'San Francisco, CA', date:'2026-05-10', time:'2:00 PM', venue:'Mission District', categories:['art','outdoors'], vibes:['artsy','chill'], desc:'A small group stroll through murals and galleries, led by a local artist.', url:'https://www.meetup.com' },
  { id:'mi-fallback', title:'Wynwood Gallery Crawl', city:'Miami, FL', date:'2026-05-10', time:'7:00 PM', venue:'Wynwood', categories:['art','nightlife'], vibes:['trendy','social'], desc:'See the latest street art and pop-up shows across Wynwood with a local guide.', url:'https://www.meetup.com' },
  { id:'po-fallback', title:'Sunrise Forest Walk', city:'Portland, OR', date:'2026-05-10', time:'8:00 AM', venue:'Forest Park', categories:['outdoors','wellness'], vibes:['chill','adventurous'], desc:'A gentle early-morning walk through mossy trails. Great for meeting people who love the outdoors.', url:'https://www.meetup.com' },
  { id:'bo-fallback', title:'Indie Bookstore Meetup', city:'Boston, MA', date:'2026-05-11', time:'6:00 PM', venue:'Cambridge Bookshop', categories:['books','coffee'], vibes:['cozy','artsy'], desc:'A meetup for readers who want to discover new favorites and meet fellow book lovers.', url:'https://www.meetup.com' },
  { id:'de-fallback', title:'RiNo Mural Walk', city:'Denver, CO', date:'2026-05-09', time:'5:30 PM', venue:'RiNo Art District', categories:['art','outdoors'], vibes:['trendy','social'], desc:'Explore murals, breweries, and pop-up art stands with a crowd that likes to wander.', url:'https://www.meetup.com' },
  { id:'na-fallback', title:'Honky-Tonk Open Mic', city:'Nashville, TN', date:'2026-05-09', time:'8:00 PM', venue:'East Side Bar', categories:['music','nightlife'], vibes:['social','cozy'], desc:'A friendly local open mic for musicians and listeners alike, just off Broadway.', url:'https://www.meetup.com' },
  { id:'bk-fallback', title:'Brooklyn Makers Market', city:'Brooklyn, NY', date:'2026-05-10', time:'11:00 AM', venue:'Greenpoint Market', categories:['crafts','food'], vibes:['artsy','social'], desc:'A small market featuring makers, snacks, and new people to meet.', url:'https://www.meetup.com' }
];

let EVENTS = [];

function getMeetupSearchUrls(coords) {
  const base = `https://api.meetup.com/find/upcoming_events?sign=true&photo-host=public&lat=${coords.lat}&lon=${coords.lon}&radius=10`;
  const auth = MEETUP_API_KEY ? `&key=${MEETUP_API_KEY}` : '';
  return [base + auth, `https://api.meetup.com/2/open_events?sign=true&photo-host=public&lat=${coords.lat}&lon=${coords.lon}&radius=10${auth}`];
}

function extractTags(text, source) {
  return source.filter(item => new RegExp(`\\b${item.label.toLowerCase()}\\b`, 'i').test(text)).map(item => item.id);
}

function normalizeMeetupEvent(raw, city) {
  const title = raw.name || raw.title || raw.event_name || raw.summary || 'Meetup event';
  const date = raw.local_date || (raw.time && raw.time.slice(0, 10)) || raw.date || '2026-05-10';
  const time = raw.local_time || (raw.time && raw.time.slice(11, 16)) || 'TBD';
  const venue = raw.venue?.name || raw.group?.name || raw.venue?.address_1 || 'Meetup venue';
  const url = raw.link || raw.url || raw.event_url || raw.self?.ref || 'https://www.meetup.com';
  const rawDesc = raw.description || raw.description_text || raw.summary || '';
  const desc = rawDesc.replace(/<[^>]*>/g, '').trim() || 'A Meetup event in your area.';
  const text = `${title} ${desc}`.toLowerCase();
  const categories = extractTags(text, INTERESTS);
  const vibes = extractTags(text, VIBES);
  return {
    id: raw.id || `${city}-${title}`,
    title,
    city,
    date,
    time,
    venue,
    url,
    desc,
    categories: categories.length ? categories : ['social'],
    vibes: vibes.length ? vibes : ['social']
  };
}

async function fetchMeetupEvents(city) {
  const coords = CITY_COORDINATES[city];
  if (!coords) throw new Error('City coordinates not configured yet.');
  for (const url of getMeetupSearchUrls(coords)) {
    try {
      const res = await fetch(url);
      if (!res.ok) continue;
      const payload = await res.json();
      const items = payload.events || payload.results || payload.results?.items || payload.events?.items || payload;
      if (!Array.isArray(items) || !items.length) continue;
      return items.map(item => normalizeMeetupEvent(item, city));
    } catch (err) {
      continue;
    }
  }
  throw new Error('Unable to fetch Meetup events at the moment.');
}

function loadFallbackEvents(city) {
  const fallback = FALLBACK_EVENTS.filter(ev => ev.city === city);
  if (fallback.length) return fallback;
  return FALLBACK_EVENTS.slice(0, 3);
}

const STATE = {
  view: 'welcome',
  ob: 0,
  profile: { city: '', origin: '', interests: [], vibes: [] },
  filter: 'all',
  toast: null,
  eventsLoaded: false,
  eventsError: null
};

/* -------- Helpers -------- */

const $app = () => document.getElementById('app');

function paletteFor(id) {
  let h = 0;
  for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) | 0;
  return PALETTES[Math.abs(h) % PALETTES.length];
}

function fmtDate(iso) {
  const d = new Date(iso + 'T12:00:00');
  return {
    day: d.getDate(),
    mon: d.toLocaleString('en', { month: 'short' }),
    weekday: d.toLocaleString('en', { weekday: 'long' })
  };
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

function showToast(text) {
  STATE.toast = text;
  render();
  setTimeout(() => { STATE.toast = null; render(); }, 2200);
}

function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

/* -------- Personalization scoring -------- */

function scoreEvent(ev, profile) {
  let score = 0;
  const reasons = [];

  const interestOverlap = ev.categories.filter(c => profile.interests.includes(c));
  score += interestOverlap.length * 3;
  if (interestOverlap.length > 0) {
    const labels = interestOverlap.map(id => INTERESTS.find(i => i.id === id)?.label.toLowerCase()).filter(Boolean);
    reasons.push(`you're into ${labels.slice(0,2).join(' + ')}`);
  }

  const vibeOverlap = ev.vibes.filter(v => profile.vibes.includes(v));
  score += vibeOverlap.length * 2;
  if (vibeOverlap.length > 0) {
    const labels = vibeOverlap.map(id => VIBES.find(v => v.id === id)?.label.toLowerCase()).filter(Boolean);
    reasons.push(`matches your ${labels.slice(0,2).join(' & ')} vibe`);
  }

  if (profile.origin && profile.origin !== profile.city && ev.vibes.includes('social')) {
    score += 1;
    reasons.push("good for meeting people while you're new in town");
  }

  let h = 0; for (let i=0;i<ev.id.length;i++) h = (h*7 + ev.id.charCodeAt(i)) & 0xff;
  score += h / 1000;

  return { score, reason: reasons.length ? reasons.slice(0,2).join(', and ') : 'a popular pick in your city this weekend' };
}

function eventsInCity() {
  return EVENTS.filter(ev => ev.city === STATE.profile.city);
}

function topThreePicks() {
  const inCity = eventsInCity();
  const scored = inCity.map(ev => ({ ev, ...scoreEvent(ev, STATE.profile) }));
  scored.sort((a,b) => b.score - a.score);
  return scored.slice(0, 3);
}

/* -------- Renderers -------- */

function render() {
  const root = $app();

  let html = '';
  if (STATE.view === 'welcome') html = renderWelcome();
  else if (STATE.view === 'onboarding') html = renderOnboarding();
  else if (STATE.view === 'loading') html = renderLoading();
  else if (STATE.view === 'feed') html = renderFeed();
  else if (STATE.view === 'personalized') html = renderPersonalized();
  else if (STATE.view === 'profile') html = renderProfile();

  if (STATE.toast) html += `<div class="toast">${escapeHtml(STATE.toast)}</div>`;

  root.innerHTML = html;
  attachHandlers();
  root.scrollTop = 0;
}

function renderWelcome() {
  return `
    <div class="welcome">
      <div class="hero">
        <h1 class="logo">Chit<span class="dot">.</span></h1>
        <h2 class="tag">Three plans. Picked for <em>your</em> weekend.</h2>
        <p class="sub">For people new to a city — or just bored of doing the same thing every Saturday.</p>
      </div>
      <div class="sticker">no doom-<br>scrolling.</div>
      <div class="actions">
        <button class="btn btn-primary" data-action="start">Get my picks</button>
        <button class="btn btn-secondary" data-action="signin">I have an account</button>
      </div>
    </div>
  `;
}

function renderOnboarding() {
  const step = STATE.ob;
  const steps = [obCity, obOrigin, obInterests, obVibes];
  const segs = [0,1,2,3].map(i => `<div class="seg ${i <= step ? 'active' : ''}"></div>`).join('');

  return `
    <div class="view">
      <div class="ob-header">
        <button class="ob-back" data-action="ob-back" aria-label="Back">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="ob-progress">${segs}</div>
      </div>
      ${steps[step]()}
    </div>
    <div class="bottom-action">
      <button class="btn btn-primary" data-action="ob-next" ${canAdvance() ? '' : 'disabled style="opacity:0.45;cursor:not-allowed"'}>
        ${step === 3 ? 'Find my picks' : 'Continue'}
      </button>
    </div>
  `;
}

function canAdvance() {
  if (STATE.ob === 0) return !!STATE.profile.city;
  if (STATE.ob === 1) return true;
  if (STATE.ob === 2) return STATE.profile.interests.length > 0;
  if (STATE.ob === 3) return STATE.profile.vibes.length > 0;
  return true;
}

function obCity() {
  return `
    <h2 class="ob-title">Where are you <em>now</em>?</h2>
    <p class="ob-sub">We'll show you what's happening here this weekend.</p>
    <div class="field">
      <label>Current city</label>
      <select class="input" data-field="city">
        <option value="">Pick a city…</option>
        ${CITIES.map(c => `<option ${STATE.profile.city===c?'selected':''} value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('')}
      </select>
    </div>
    <p class="ob-sub" style="margin-top:8px;font-size:12px;">More cities coming. Don't see yours? Pick the closest for now.</p>
  `;
}

function obOrigin() {
  return `
    <h2 class="ob-title">And where are you <em>from</em>?</h2>
    <p class="ob-sub">If you're new in town, this helps us find things that'll feel familiar — or refreshingly not.</p>
    <div class="field">
      <label>Hometown / where you moved from</label>
      <input class="input" type="text" placeholder="e.g., Houston, TX" value="${escapeHtml(STATE.profile.origin)}" data-field="origin" />
    </div>
    <p class="ob-sub" style="margin-top:8px;font-size:12px;">Optional. Skip if you'd rather.</p>
  `;
}

function obInterests() {
  return `
    <h2 class="ob-title">What are you <em>into</em>?</h2>
    <p class="ob-sub">Pick a few — three or four is the sweet spot.</p>
    <div class="chips">
      ${INTERESTS.map(i => `
        <button class="chip ${STATE.profile.interests.includes(i.id) ? 'selected' : ''}" data-toggle-interest="${i.id}">
          <span class="emoji">${i.emoji}</span>${i.label}
        </button>
      `).join('')}
    </div>
  `;
}

function obVibes() {
  return `
    <h2 class="ob-title">What's your <em>vibe</em>?</h2>
    <p class="ob-sub">Pick one or two. There's no wrong answer.</p>
    <div class="chips">
      ${VIBES.map(v => `
        <button class="chip ${STATE.profile.vibes.includes(v.id) ? 'selected' : ''}" data-toggle-vibe="${v.id}">
          <span class="emoji">${v.emoji}</span>${v.label}
        </button>
      `).join('')}
    </div>
  `;
}

function renderLoading() {
  return `
    <div class="loading">
      <div class="pulse">.</div>
      <p>Finding your three…</p>
    </div>
  `;
}

function renderFeed() {
  const events = eventsInCity();
  const filters = ['all', ...new Set(events.flatMap(e => e.categories))];
  const filteredEvents = STATE.filter === 'all'
    ? events
    : events.filter(e => e.categories.includes(STATE.filter));

  const firstName = STATE.profile.origin ? STATE.profile.origin.split(',')[0] : null;
  const cityShort = STATE.profile.city.split(',')[0];

  return `
    <div class="view">
      <div class="feed-header">
        <p class="feed-greet">${firstName ? `New from ${escapeHtml(firstName)}? ` : ''}This weekend in</p>
        <h1 class="feed-title">
          <span class="city-pill" data-action="open-profile">${escapeHtml(cityShort)} <span style="opacity:.6;font-size:11px">▾</span></span>
        </h1>
      </div>

      <div class="upgrade-banner">
        <h3>Your top three picks are ready</h3>
        <p>${STATE.eventsError ? escapeHtml(STATE.eventsError) + ' Showing the best available meetup events below.' : `Meetup events in ${escapeHtml(cityShort)} scored against your interests and vibe.`}</p>
        <button class="cta" data-action="see-picks">
          View my picks
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 2l5 5-5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>

      <div class="filter-row">
        ${filters.map(f => `
          <button class="chip ${STATE.filter===f ? 'selected':''}" data-set-filter="${f}">
            ${f === 'all' ? 'All' : (INTERESTS.find(i=>i.id===f)?.emoji || '') + ' ' + (INTERESTS.find(i=>i.id===f)?.label || cap(f))}
          </button>
        `).join('')}
      </div>

      <div class="section-head">
        <h3>${filteredEvents.length} event${filteredEvents.length===1?'':'s'} ${STATE.filter==='all'?'this weekend':'matching'}</h3>
      </div>

      <div class="event-list">
        ${filteredEvents.length === 0 ? `
          <div class="empty"><div class="icon">🌫️</div><p>No events match this filter yet.<br/>Try changing your interests or picking a nearby city.</p></div>
        ` : filteredEvents.map(eventCard).join('')}
      </div>
    </div>
  `;
}

function eventCard(ev) {
  const [c1, c2] = paletteFor(ev.id);
  const d = fmtDate(ev.date);
  const cat = ev.categories[0];
  const catObj = INTERESTS.find(i => i.id === cat);
  return `
    <div class="event-card" data-event="${ev.id}">
      <div class="event-img" style="--c1:${c1};--c2:${c2}">
        <div class="date-badge">
          <span class="day">${d.day}</span>
          <span class="mon">${d.mon}</span>
        </div>
        <div class="cat-badge">${catObj?.emoji || ''} ${catObj?.label || cap(cat)}</div>
      </div>
      <div class="event-body">
        <h3 class="event-title">${escapeHtml(ev.title)}</h3>
        <div class="event-meta">
          <span>${d.weekday} · ${escapeHtml(ev.time)}</span>
          <span class="sep"></span>
          <span>${escapeHtml(ev.venue)}</span>
        </div>
        <p class="event-desc">${escapeHtml(ev.desc)}</p>
        <div class="event-tags">
          ${ev.vibes.map(v => `<span class="event-tag">${VIBES.find(x=>x.id===v)?.emoji || ''} ${VIBES.find(x=>x.id===v)?.label || cap(v)}</span>`).join('')}
        </div>
      </div>
    </div>
  `;
}

function renderPersonalized() {
  const picks = topThreePicks();
  const numbers = ['One', 'Two', 'Three'];
  const cityShort = STATE.profile.city.split(',')[0];
  const originShort = STATE.profile.origin ? STATE.profile.origin.split(',')[0] : '';

  return `
    <div class="view">
      <div class="ob-header" style="padding-top:18px">
        <button class="ob-back" data-action="back-to-feed" aria-label="Back">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div style="flex:1"></div>
        <button class="ob-back" data-action="open-profile" aria-label="Profile">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="6" r="2.6" stroke="currentColor" stroke-width="1.4"/><path d="M3 13c.8-2.2 2.8-3.4 5-3.4s4.2 1.2 5 3.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="picks-header">
        <p class="picks-eyebrow">Top picks · for ${escapeHtml(cityShort)}</p>
        <h1 class="picks-title">Your <em>three</em> for this weekend.</h1>
        <p class="picks-sub">Picked for your interests, your vibe${originShort ? `, and the fact you just landed from ${escapeHtml(originShort)}` : ''}.</p>
      </div>

      ${picks.length === 0 ? `
        <div class="empty"><div class="icon">🤷</div><p>We couldn't find good picks in ${escapeHtml(cityShort)} yet — try changing your filters.</p></div>
      ` : picks.map((p, i) => pickCard(p, numbers[i])).join('')}

      <div class="divider"></div>
      <button class="btn btn-ghost" data-action="back-to-feed">See all events in ${escapeHtml(cityShort)}</button>
    </div>
  `;
}

function pickCard(p, label) {
  const ev = p.ev;
  const [c1, c2] = paletteFor(ev.id);
  const d = fmtDate(ev.date);
  const cat = ev.categories[0];
  const catObj = INTERESTS.find(i => i.id === cat);
  return `
    <div class="pick-card">
      <div class="number-row">
        <span class="number">${label}</span>
        <span class="number-label">Pick</span>
      </div>
      <div class="reason">
        <span class="ic">✦</span>
        <span>Picked because ${escapeHtml(p.reason)}.</span>
      </div>
      <div class="pick-img" style="--c1:${c1};--c2:${c2}">
        <div class="date-badge">
          <span class="day">${d.day}</span>
          <span class="mon">${d.mon}</span>
        </div>
        <div class="cat-badge">${catObj?.emoji || ''} ${catObj?.label || cap(cat)}</div>
      </div>
      <div class="pick-body">
        <h3 class="pick-title">${escapeHtml(ev.title)}</h3>
        <div class="pick-meta">
          <span>${d.weekday} · ${escapeHtml(ev.time)}</span>
          <span class="sep"></span>
          <span>${escapeHtml(ev.venue)}</span>
        </div>
        <p class="pick-desc">${escapeHtml(ev.desc)}</p>
        <div class="pick-actions">
          <a href="${escapeHtml(ev.url)}" target="_blank" rel="noopener noreferrer">Visit event ↗</a>
          <button class="save" data-action="save-event" data-id="${ev.id}" aria-label="Save">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 2h8v12l-4-2.5L4 14V2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>
    </div>
  `;
}

function renderProfile() {
  const initial = (STATE.profile.origin || STATE.profile.city || 'C').trim().charAt(0).toUpperCase();
  return `
    <div class="view">
      <div class="ob-header" style="padding-top:18px">
        <button class="ob-back" data-action="back-to-feed" aria-label="Back">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div style="flex:1; font-family:'Fraunces', serif; font-size:20px; font-weight:600;">Your profile</div>
      </div>

      <div class="profile-card">
        <div class="row">
          <div class="avatar">${escapeHtml(initial)}</div>
          <div class="meta">
            <strong>${escapeHtml(STATE.profile.city.split(',')[0] || 'Somewhere')}</strong>
            <span>${STATE.profile.origin ? 'from ' + escapeHtml(STATE.profile.origin.split(',')[0]) : 'just settling in'}</span>
          </div>
        </div>
      </div>

      <div class="section-head"><h3>Your interests</h3><span class="count">${STATE.profile.interests.length}</span></div>
      <div class="chips" style="margin-bottom:18px">
        ${STATE.profile.interests.length === 0 ? '<span style="color:var(--muted);font-size:13px">None yet.</span>' :
          STATE.profile.interests.map(id => {
            const o = INTERESTS.find(x=>x.id===id); if (!o) return '';
            return `<span class="chip selected"><span class="emoji">${o.emoji}</span>${o.label}</span>`;
          }).join('')}
      </div>

      <div class="section-head"><h3>Your vibe</h3><span class="count">${STATE.profile.vibes.length}</span></div>
      <div class="chips" style="margin-bottom:24px">
        ${STATE.profile.vibes.length === 0 ? '<span style="color:var(--muted);font-size:13px">None yet.</span>' :
          STATE.profile.vibes.map(id => {
            const o = VIBES.find(x=>x.id===id); if (!o) return '';
            return `<span class="chip selected"><span class="emoji">${o.emoji}</span>${o.label}</span>`;
          }).join('')}
      </div>

      <button class="btn btn-ghost" data-action="restart">Redo my profile</button>
    </div>
  `;
}

/* -------- Handlers -------- */

function attachHandlers() {
  const citySel = document.querySelector('[data-field="city"]');
  if (citySel) citySel.addEventListener('change', e => { STATE.profile.city = e.target.value; render(); });

  const origin = document.querySelector('[data-field="origin"]');
  if (origin) origin.addEventListener('input', e => { STATE.profile.origin = e.target.value; });

  document.querySelectorAll('[data-toggle-interest]').forEach(el => {
    el.addEventListener('click', () => {
      toggleArr(STATE.profile.interests, el.dataset.toggleInterest); render();
    });
  });
  document.querySelectorAll('[data-toggle-vibe]').forEach(el => {
    el.addEventListener('click', () => {
      toggleArr(STATE.profile.vibes, el.dataset.toggleVibe); render();
    });
  });

  document.querySelectorAll('[data-set-filter]').forEach(el => {
    el.addEventListener('click', () => { STATE.filter = el.dataset.setFilter; render(); });
  });

  document.querySelectorAll('[data-stop]').forEach(el => {
    el.addEventListener('click', e => e.stopPropagation());
  });

  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', () => handleAction(el.dataset.action, el));
  });
}

function toggleArr(arr, id) {
  const i = arr.indexOf(id);
  if (i === -1) arr.push(id); else arr.splice(i, 1);
}

function handleAction(action) {
  switch (action) {
    case 'start':
      STATE.view = 'onboarding'; STATE.ob = 0; render(); break;
    case 'signin':
      showToast('Sign-in is coming. Try "Get my picks".'); break;
    case 'ob-back':
      if (STATE.ob === 0) { STATE.view = 'welcome'; render(); }
      else { STATE.ob--; render(); }
      break;
    case 'ob-next':
      if (!canAdvance()) return;
      if (STATE.ob < 3) { STATE.ob++; render(); }
      else {
        STATE.view = 'loading'; STATE.eventsLoaded = false; STATE.eventsError = null; render();
        fetchMeetupEvents(STATE.profile.city)
          .then(events => {
            EVENTS = events;
            STATE.eventsLoaded = true;
            STATE.eventsError = null;
            STATE.view = 'feed';
            render();
          })
          .catch(err => {
            EVENTS = loadFallbackEvents(STATE.profile.city);
            STATE.eventsLoaded = true;
            STATE.eventsError = err.message || 'Could not load Meetup events.';
            STATE.view = 'feed';
            render();
          });
      }
      break;
    case 'see-picks':
      STATE.view = 'personalized'; render(); break;
    case 'back-to-feed':
      STATE.view = 'feed'; render(); break;
    case 'open-profile':
      STATE.view = 'profile'; render(); break;
    case 'restart':
      STATE.profile = { city:'', origin:'', interests:[], vibes:[] };
      STATE.ob = 0;
      STATE.view = 'onboarding'; render(); break;
    case 'save-event':
      showToast("Saved · we'll remind you before it starts"); break;
  }
}

document.addEventListener('DOMContentLoaded', render);
render();
</script>

</body>
</html>
